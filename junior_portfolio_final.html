<!DOCTYPE html>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Junior — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#c0c0c0;font-family:Arial,sans-serif;overflow-x:hidden}

/* PAGE WRAPPER */
.page{
  width:780px;
  min-height:520px;
  margin:0 auto 40px;
  background:#b8b8b8;
  border:2px solid #888;
  position:relative;
  overflow:hidden;
}

/* DIAGONAL SLABS */



/* NAV */
.nav{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:30px;
  padding:8px 20px;
  border-bottom:1px solid #ccc;
}
.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1px;
  font-size:11px;
  color:#222;
  cursor:pointer;
}
.nav-item.active{font-weight:bold;text-decoration:underline}
.nav-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.nav-icon svg{width:18px;height:18px}

/* CONTENT */
.content{padding:16px 20px 10px;display:flex;gap:18px;align-items:center;}

/* TEXT BOX */
.text-box{
  background:#d2d2d2;
  border:2px solid #aaa;
  border-radius:14px;
  padding:16px 18px;
  width:285px;
  flex-shrink:0;
}
.text-box p{
  font-family:Georgia,'Times New Roman',serif;
  font-size:14.5px;
  font-weight:bold;
  line-height:1.7;
  color:#111;
}

/* PHOTO BOX */
.photo-box{
  background:#888;
  border:2px solid #555;
  border-radius:14px;
  width:px;
  height:182px;
  flex-shrink:0;
  margin-left:auto;
  overflow:hidden;
}
.photo-box img{
  width:100%;height:100%;
  object-fit:cover;
  object-position:center top;
  filter:grayscale(100%);
  display:block;
}

/* BUTTONS */
.btn-row{display:flex;gap:18px;padding:12px 20px 8px}
.btn{
  background:#d4d4d4;
  border:2px solid #999;
  border-radius:20px;
  padding:7px 28px;
  font-family:Georgia,serif;
  font-size:13.5px;
  font-weight:bold;
  color:#111;
  cursor:pointer;
}
.btn:hover{background:#bbb}

/* CONTACT STRIP */
.contact-strip{
  padding:6px 20px 10px;
  border-top:1px solid #ccc;
}
.contact-label{font-size:13px;font-weight:bold;color:#111;margin-bottom:6px}
.contact-items{display:flex;gap:36px;align-items:center}
.contact-item{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:bold;color:#111}
.contact-item svg{width:20px;height:20px;flex-shrink:0}

</style>
</head>
<body>
