<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto;
        }
        label.textarea{
            display: block;
        }
        .contact-container {
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
        }
        .contact-info {
          margin-left: 0;
        }
        input{
            height: 56px;
            width: 336px;
            border: 1;
            border-radius: 22px;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        textarea{
            height: 96px;
            width: 456px;
            border: 5;
            border-radius: 28px;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        form button {
          padding: 12px;
          border-radius: 20px;
          border: none;
          background: #535050;
          color: #D9D9D9;
          font-weight: bold;
        }
            form button:hover {
            background: #D9D9D9;
            color: #535050;
            transform: scale(1.5);
            animation-name: myAnimation;
            animation-duration: 0.5s;
            }
    </style>
</head>
<body>
    <form>
        <div class="form-section">
        <label for="name">Name</label><br>
        <input type="text" placeholder="Your name..." id="name" name="name"><br>
        <label for="email">Email</label><br>
        <input type="email" placeholder="Your email..." id="email" name="email"><br>
        <label for="message">Message</label><br>
        <textarea id="message" name="message" placeholder="Your message..." rows="6" columns="44"></textarea><br>
        <button type="submit" id="send">Send</button>
        </div>
    </form>
</body>
</html>
