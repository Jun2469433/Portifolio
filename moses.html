<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>
<style>
body{
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: auto;
}
label.textarea{
    display: block;
}
.contact-container {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.contact-info {
  margin-left: 0;
}
input{
            height: 56px;
            width: 336px;
            border: 1;
            border-radius: 22px;
            margin-top: 10px;
            margin-bottom: 10px;
        }
textarea{
    height: 96px;
            width: 456px;
            border: 5;
            border-radius: 28px;
            margin-top: 20px;
            margin-bottom: 20px;
}
form button {
  padding: 12px;
  border-radius: 20px;
  border: none;
  background: black;
  color: white;
  font-weight: bold;
}


</style>
</head>
<body>

<form>
  <h2>Contact Me</h2>

  <div class="contact-container">
    <div class="contact-info">
      <p><strong>Instagram:</strong> ms._moses</p>
      <p><strong>Phone:</strong> 0728619365</p>
      <p><strong>Email:</strong> mmoshami22@gmail.com</p>
    </div>

    <div class="form-section">
    <label>Name</label><br>
      <input type="text" name="name" placeholder="Your Name" ><br>
    <label>Email</label><br>
      <input type="email" name="email" placeholder="Your Email" ><br>
    <label>Message</label><br>
      <textarea name="message" rows="5" placeholder="Your Message" ></textarea><br>
      <button type="submit">Send Message</button>
    </div>
  </div>
</form>
</body>
</html>
